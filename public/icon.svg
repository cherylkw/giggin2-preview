<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .background { fill: #000000; }
      .foreground { fill: #ffffff; }
      .accent { fill: #f97316; }
    }
    @media (prefers-color-scheme: dark) {
      .background { fill: #ffffff; }
      .foreground { fill: #000000; }
      .accent { fill: #f97316; }
    }
  </style>
  <rect class="background" width="180" height="180" rx="40" />
  
  <!-- Musical note design -->
  <g transform="translate(90, 90)">
    <!-- First note head -->
    <circle class="accent" cx="-20" cy="25" r="12"/>
    
    <!-- Second note head -->
    <circle class="accent" cx="20" cy="35" r="12"/>
    
    <!-- First stem -->
    <rect class="foreground" x="-28" y="-15" width="6" height="42" rx="3"/>
    
    <!-- Second stem -->
    <rect class="foreground" x="14" y="-25" width="6" height="52" rx="3"/>
    
    <!-- Connecting beam (top) -->
    <path class="foreground" d="M -22 -15 Q 0 -22 20 -25 L 20 -18 Q 0 -15 -22 -8 Z"/>
    
    <!-- Connecting beam (bottom) -->
    <path class="foreground" d="M -22 -8 L 20 -18 L 20 -11 L -22 -1 Z"/>
  </g>
</svg>